services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
     - .env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

    ports:
      - "8080:8080"
    networks:
    - chattingo_net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8080:80" 
    networks:
      - chattingo_net
  database:
    image: mysql:8.0
    env_file:
     - .env
    ports:
      - "3306:3306"
    networks:
      - chattingo_net
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

    
volumes:
  db_data:
networks:
  chattingo_net:
  